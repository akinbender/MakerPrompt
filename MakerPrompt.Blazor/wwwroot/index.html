<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MakerPrompt</title>
    <meta name="title" content="MakerPrompt - Open Source 3D Printer Management">
    <meta name="description" content="Cross-platform interface for 3D printer management. Supports Prusalink, Moonraker, and direct serial control. Developed at x-hain hackspace using Blazor Hybrid.">
    <meta name="keywords" content="3D printer management, 3D printer maintenance, Blazor Hybrid, open source 3D printing, Pronterface alternative, Prusalink, Moonraker, Web Serial control" />
    <meta name="robots" content="index, follow">
    <meta name="author" content="Akın Bender" />
    <base href="/" />
    <script>
        (function () {
            try {
                var configJson = window.localStorage.getItem('AppConfig');
                var themeKey = 'auto';
                if (configJson) {
                    var config = JSON.parse(configJson);
                    if (config && config.Theme !== undefined && config.Theme !== null) {
                        var raw = config.Theme;
                        if (typeof raw === 'string') {
                            themeKey = raw.toLowerCase();
                        } else if (typeof raw === 'number') {
                            switch (raw) {
                                case 1: themeKey = 'light'; break;   // Theme.Light
                                case 2: themeKey = 'dark'; break;    // Theme.Dark
                                case 3: themeKey = 'mpdark'; break;  // Theme.MpDark
                                default: themeKey = 'auto'; break;   // Theme.Auto or unknown
                            }
                        }
                    }
                }

                var resolvedTheme = themeKey;
                if (!resolvedTheme || resolvedTheme === 'auto') {
                    resolvedTheme = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches
                        ? 'dark'
                        : 'light';
                }

                document.documentElement.setAttribute('data-bs-theme', resolvedTheme);
                document.documentElement.style.colorScheme = resolvedTheme;
            } catch { }
        })();
    </script>
    <link rel="stylesheet" href="MakerPrompt.Blazor.styles.css" />
    <link rel="stylesheet" href="_content/MakerPrompt.Shared/lib/bootstrap/css/bootstrap.min.css" />
    <link rel="stylesheet" href="_content/MakerPrompt.Shared/lib/bootstrap-icons/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="_content/Blazor.Bootstrap/blazor.bootstrap.css"  />
    <link rel="stylesheet" href="_content/MakerPrompt.Shared/css/app.css" />
    <link rel="icon" type="image/png" href="_content/MakerPrompt.Shared/favicon.png" />
    <link href="manifest.webmanifest" rel="manifest" />
    <link rel="apple-touch-icon" sizes="512x512" href="favicon.png" />
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>
    <script src="_content/MakerPrompt.Shared/lib/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="_content/MakerPrompt.Shared/lib/gcode-viewer/_bundles/gcode-viewer.min.js"></script>
    <script src="_framework/blazor.webassembly.js"></script>
    <script src="_content/Blazor.Bootstrap/blazor.bootstrap.js"></script>
    <script>navigator.serviceWorker.register('service-worker.js');</script>
    <script>
        window.blazorCulture = {
            get: () => window.localStorage['BlazorCulture'],
            set: (value) => window.localStorage['BlazorCulture'] = value
        };
    </script>
    <script>
        function toBase64(bytes) {
            let binary = '';
            const chunkSize = 0x8000;
            for (let i = 0; i < bytes.length; i += chunkSize) {
                const chunk = bytes.subarray(i, i + chunkSize);
                binary += String.fromCharCode.apply(null, chunk);
            }
            return btoa(binary);
        }

        function fromBase64(base64) {
            return Uint8Array.from(atob(base64), c => c.charCodeAt(0));
        }

        window.makerPromptCrypto = {
            encrypt: async (plaintext, base64Key) => {
                const enc = new TextEncoder();
                const keyBytes = fromBase64(base64Key);
                const cryptoKey = await crypto.subtle.importKey('raw', keyBytes, { name: 'AES-GCM' }, false, ['encrypt']);
                const iv = crypto.getRandomValues(new Uint8Array(12));
                const cipherBuffer = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, cryptoKey, enc.encode(plaintext));
                const cipherBytes = new Uint8Array(cipherBuffer);

                return JSON.stringify({
                    v: 1,
                    iv: toBase64(iv),
                    ct: toBase64(cipherBytes)
                });
            },
            decrypt: async (payload, base64Key) => {
                try {
                    const envelope = JSON.parse(payload);
                    if (!envelope || envelope.v !== 1 || !envelope.iv || !envelope.ct) {
                        return null;
                    }

                    const keyBytes = fromBase64(base64Key);
                    const iv = fromBase64(envelope.iv);
                    const cipherBytes = fromBase64(envelope.ct);
                    const cryptoKey = await crypto.subtle.importKey('raw', keyBytes, { name: 'AES-GCM' }, false, ['decrypt']);
                    const plainBuffer = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, cryptoKey, cipherBytes);
                    return new TextDecoder().decode(plainBuffer);
                } catch {
                    return null;
                }
            }
        };
    </script>
</body>

</html>
